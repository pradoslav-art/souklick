<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Souklick</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Souklick" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <noscript>Please enable JavaScript to use Souklick.</noscript>
    <script>
      window.addEventListener("error", function(e) {
        var d = document.getElementById("root");
        if (d && !d.hasChildNodes()) {
          d.innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:600px;margin:0 auto">' +
            '<h2 style="color:#e53e3e">Souklick failed to load</h2>' +
            '<p style="color:#555">' + (e.message || "Unknown error") + '</p>' +
            '<p style="color:#888;font-size:13px">' + (e.filename || "") + ':' + (e.lineno || "") + '</p>' +
            '<p style="margin-top:16px"><button onclick="location.reload()" style="padding:8px 16px;cursor:pointer">Reload</button></p></div>';
        }
      });
      window.addEventListener("unhandledrejection", function(e) {
        var d = document.getElementById("root");
        if (d && !d.hasChildNodes()) {
          d.innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:600px;margin:0 auto">' +
            '<h2 style="color:#e53e3e">Souklick failed to load</h2>' +
            '<p style="color:#555">' + (e.reason && e.reason.message ? e.reason.message : String(e.reason || "Promise rejected")) + '</p>' +
            '<p style="margin-top:16px"><button onclick="location.reload()" style="padding:8px 16px;cursor:pointer">Reload</button></p></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
